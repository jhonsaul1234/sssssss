<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perdón</title>
  <style>
    :root {
      --bg: #fffdf8;
      --text: #c86a45;
      --green: #32b866;
      --orange: #d56b38;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(430px, 100%);
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 3.8vw, 2rem);
      margin-bottom: 18px;
      line-height: 1.3;
    }

    .img-box {
      width: 220px;
      margin: 0 auto 18px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }

    .img-box img {
      width: 100%;
      display: block;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 4px;
    }

    button {
      border: 0;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      border-radius: 999px;
      padding: 9px 20px;
      min-width: 62px;
      transition: transform .15s ease, opacity .15s ease;
    }

    #yesBtn {
      background: var(--green);
    }

    #noBtn {
      background: var(--orange);
      position: relative;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <section id="step1">
      <h1>¿Me perdonas? 🐶</h1>
      <div class="img-box">
        <img src="inicio.png" alt="imagen inicial tierna">
      </div>
      <div class="buttons" id="buttonsWrap">
        <button id="yesBtn">Sí</button>
        <button id="noBtn">No</button>
      </div>
    </section>

    <section id="step2" class="hidden">
      <h1>¡Sabía que me perdonarías! ❤️<br>Enserio pw perdon :/</h1>
      <div class="img-box">
        <img src="final.png" alt="imagen final tierna">
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      addDoc,
      collection,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const step1 = document.getElementById("step1");
    const step2 = document.getElementById("step2");

    let db = null;
    let yesScale = 1;

    const hasFirebaseConfig = firebaseConfig && !firebaseConfig.apiKey.includes("PEGA_AQUI");
    if (hasFirebaseConfig) {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    } else {
      console.warn("Firebase no configurado. Se muestra la animacion pero no se guarda respuesta.");
    }

    yesBtn.addEventListener("click", () => {
      yesBtn.disabled = true;

      step1.classList.add("hidden");
      step2.classList.remove("hidden");

      if (db) {
        addDoc(collection(db, "respuestas"), {
          respuesta: "si",
          createdAt: serverTimestamp(),
          createdAtClient: Date.now(),
          userAgent: navigator.userAgent
        }).catch((error) => {
          console.error("No se pudo guardar en Firestore:", error);
        });
      }
    });

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("click", moveNoButton);
    noBtn.addEventListener("touchstart", moveNoButton, { passive: true });

    function moveNoButton(event) {
      event.preventDefault?.();

      yesScale = Math.min(yesScale + 0.15, 2.2);
      yesBtn.style.transform = `scale(${yesScale})`;

      const maxRangeX = Math.max(window.innerWidth * 0.35, 180);
      const maxRangeY = Math.max(window.innerHeight * 0.22, 110);

      const randomX = (Math.random() * 2 - 1) * maxRangeX;
      const randomY = (Math.random() * 2 - 1) * maxRangeY;

      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;
    }
  </script>
</body>
</html>
